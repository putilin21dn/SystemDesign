services:
  postgres:
    image: postgres:15-alpine
    container_name: fitness_tracker_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fitness_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: fitness_tracker_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      USERVER_PG_HOST: postgres
      USERVER_PG_PORT: 5432
      USERVER_PG_DB: fitness_tracker
      USERVER_PG_USER: postgres
      USERVER_PG_PASSWORD: postgres
    ports:
      - "8080:8080"
    volumes:
      - ./configs/config.yaml:/etc/fitness_tracker/config.yaml

volumes:
  postgres_data:

networks:
  default:
    name: fitness_tracker_network
